<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="header">
        <span>Rock🪨</span>
        <span>Paper📃</span>
        <span>Scissors✂️</span>
    </header>
    <main class="main">
        <div class="playerChoice">
            <div>Choose your weapon!</div>
            <div class="choiceButtons">
                <div class="choice">
                    <span class="choiceLabel">Rock</span>
                    <button class="choiceRock">🪨</button>
                </div>
                <div class="choice">
                    <span class="choiceLabel">Paper</span>
                    <button class="choicePaper">📃</button>
                </div>
                <div class="choice">
                    <span class="choiceLabel">Scissors</span>
                    <button class="choiceScissors">✂️</button>
                </div>
            </div>
        </div>

        <div class="computerChoiceBox">
            <span>The Computer chooses: </span>
            <span class="getComputerChoice">Rock</span>
        </div>
        </div>
    </main>
</body>
</html>
